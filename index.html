<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no" />
  <title>Neural Clicker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="app-shell">
    <section class="notes-card" aria-label="PowerPoint speaker notes">
      <div id="slideLabel" class="slide-label">Waiting for PowerPoint…</div>
      <div id="notesText" class="notes-text">Start the PC listener and open a PowerPoint slideshow.</div>
      <div id="pageLabel" class="page-label hidden"></div>
    </section>

    <section class="clicker-pad" aria-label="Neural Clicker controls">
      <div id="arrowUp" class="arrow arrow-up">▲</div>
      <div id="arrowLeft" class="arrow arrow-left">◀</div>
      <div id="centerClick" class="center-button">●</div>
      <div id="arrowRight" class="arrow arrow-right">▶</div>
      <div id="arrowDown" class="arrow arrow-down">▼</div>
    </section>

    <section class="status-row">
      <span id="statusText">Ready</span>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
