<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neural Clicker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <main id="app" aria-label="Neural Clicker presentation controller">
    <section id="permissionScreen" class="screen active">
      <h1>Neural Clicker</h1>
      <p class="subtitle">Presentation control for wearable display input.</p>
      <p class="small">Swipe to send arrow keys. Pinch to send Enter.</p>
      <button id="startButton" class="button selected">START</button>
    </section>

    <section id="clickerScreen" class="screen">
      <div id="statusText" class="status">READY</div>

      <div id="upArrow" class="control arrow up">▲</div>
      <div id="leftArrow" class="control arrow left">◀</div>
      <div id="centerButton" class="control center">ENTER</div>
      <div id="rightArrow" class="control arrow right">▶</div>
      <div id="downArrow" class="control arrow down">▼</div>

      <div id="footerHint" class="hint">Swipe: arrows · Pinch: Enter</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
